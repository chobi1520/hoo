    <style>
        :root {
            --kakao-bg: #abc1d1;
            --kakao-yellow: #fee500;
            --sidebar-bg: #f8f9fa;
            --white: #ffffff;
        }
        body { margin: 0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* 사이드바 스타일 */
        #sidebar {
            width: 250px;
            background: var(--sidebar-bg);
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-header { padding: 20px; background: #444; color: white; font-weight: bold; text-align: center; }
        .search-box { padding: 10px; }
        #search-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        #date-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .month-group { margin-bottom: 10px; }
        .month-title { 
            padding: 8px 12px; background: #eee; cursor: pointer; font-weight: bold; 
            border-radius: 5px; display: flex; justify-content: space-between;
        }
        .month-title:hover { background: #e0e0e0; }
        .date-items { padding-left: 10px; display: none; }
        .date-items.active { display: block; }
        .date-btn { 
            display: block; width: 100%; text-align: left; padding: 6px 15px; 
            border: none; background: none; cursor: pointer; color: #555; font-size: 14px;
        }
        .date-btn:hover { color: #000; text-decoration: underline; }
        .date-btn.selected { font-weight: bold; color: #000; background: rgba(0,0,0,0.05); }

        /* 채팅창 스타일 */
        #chat-container { flex: 1; background: var(--kakao-bg); display: flex; flex-direction: column; position: relative; }
        header { background: rgba(0,0,0,0.05); padding: 15px; text-align: center; font-weight: bold; }
        #chat-log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }

        .msg { display: flex; margin-bottom: 15px; max-width: 85%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg.other { align-self: flex-start; }
        
        .profile { width: 40px; height: 40px; background: #fff; border-radius: 15px; margin: 0 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #999; border: 1px solid #ddd; }
        .content-wrap { display: flex; flex-direction: column; }
        .sender { font-size: 12px; margin-bottom: 4px; color: #444; }
        .bubble { padding: 8px 12px; border-radius: 10px; font-size: 14px; line-height: 1.4; word-break: break-all; position: relative; }
        .other .bubble { background: var(--white); }
        .me .bubble { background: var(--kakao-yellow); }
        .time { font-size: 10px; color: #666; align-self: flex-end; margin: 0 5px; }
        .sys-msg { align-self: center; background: rgba(0,0,0,0.1); color: white; padding: 5px 15px; border-radius: 15px; font-size: 12px; margin: 15px 0; }
        
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">대화 목록</div>

</div>

`; // 실제 파일 내용이 여기에 더 길게 들어갈 수 있습니다.

const chatData = {};

function parseData(text) {
    const lines = text.trim().split('\n');
    let currentDate = "";

    lines.forEach(line => {
        const dateMatch = line.match(/^(\d{4}년 \d{1,2}월 \d{1,2}일)/);
        if (dateMatch && !line.includes(',')) {
            currentDate = dateMatch[1];
            if (!chatData[currentDate]) chatData[currentDate] = [];
            return;
        }

        const msgMatch = line.match(/^(\d{4}년 \d{1,2}월 \d{1,2}일) (오전|오후) (\d{1,2}:\d{2}), (.*?) : (.*)$/);
        if (msgMatch) {
            const date = msgMatch[1];
            if (!chatData[date]) chatData[date] = [];
            chatData[date].push({
                time: msgMatch[2] + " " + msgMatch[3],
                sender: msgMatch[4],
                content: msgMatch[5]
            });
        } else if (line.includes('들어왔습니다') || line.includes('삭제되었습니다')) {
            const dateParts = line.split(' ');
            const dateKey = `${dateParts[0]} ${dateParts[1]} ${dateParts[2]}`;
            if (!chatData[dateKey]) chatData[dateKey] = [];
            chatData[dateKey].push({ type: 'sys', content: line.split(', ')[1] || line });
        }
    });
}

parseData(rawData);

const dateList = document.getElementById('date-list');
const chatLog = document.getElementById('chat-log');
const chatTitle = document.getElementById('chat-title');
const searchInput = document.getElementById('search-input');

// 날짜 그룹화 및 사이드바 생성
function renderSidebar() {
    dateList.innerHTML = "";
    const groups = {};
    
    Object.keys(chatData).forEach(date => {
        const month = date.substring(0, date.lastIndexOf(' ')); // "2025년 10월"
        if (!groups[month]) groups[month] = [];
        groups[month].push(date);
    });

    Object.keys(groups).sort().forEach(month => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'month-group';
        
        const title = document.createElement('div');
        title.className = 'month-title';
        title.innerHTML = `<span>${month}</span> <span>▾</span>`;
        title.onclick = () => {
            const items = groupDiv.querySelector('.date-items');
            items.classList.toggle('active');
            title.querySelector('span:last-child').innerText = items.classList.contains('active') ? '▴' : '▾';
        };

        const itemsDiv = document.createElement('div');
        itemsDiv.className = 'date-items';
        
        groups[month].forEach(date => {
            const btn = document.createElement('button');
            btn.className = 'date-btn';
            btn.innerText = date.split('월 ')[1]; // "6일" 만 표시
            btn.onclick = () => {
                document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                renderChat(date);
            };
            itemsDiv.appendChild(btn);
        });

        groupDiv.appendChild(title);
        groupDiv.appendChild(itemsDiv);
        dateList.appendChild(groupDiv);
    });
}

function renderChat(date) {
    chatLog.innerHTML = "";
    chatTitle.innerText = date;
    
    if (!chatData[date]) return;

    chatData[date].forEach(m => {
        if (m.type === 'sys') {
            chatLog.innerHTML += `<div class="sys-msg">${m.content}</div>`;
        } else {
            const isMe = m.sender.includes("사이하라");
            chatLog.innerHTML += `
                <div class="msg ${isMe ? 'me' : 'other'}">
                    ${!isMe ? `<div class="profile">${m.sender[0]}</div>` : ''}
                    <div class="content-wrap">
                        ${!isMe ? `<div class="sender">${m.sender}</div>` : ''}
                        <div style="display:flex; ${isMe ? 'flex-direction:row-reverse' : ''}">
                            <div class="bubble">${m.content}</div>
                            <div class="time">${m.time}</div>
                        </div>
                    </div>
                </div>`;
        }
    });
    chatLog.scrollTop = 0;
}

// 검색 기능
searchInput.oninput = (e) => {
    const word = e.target.value.trim();
    if (!word) return;

    chatLog.innerHTML = "";
    chatTitle.innerText = `"${word}" 검색 결과`;

    Object.keys(chatData).forEach(date => {
        chatData[date].forEach(m => {
            if (m.content && m.content.includes(word)) {
                const isMe = m.sender?.includes("사이하라");
                chatLog.innerHTML += `<div class="sys-msg">${date}</div>`;
                chatLog.innerHTML += `
                    <div class="msg ${isMe ? 'me' : 'other'}">
                        <div class="content-wrap">
                            <div class="bubble">${m.content.replace(word, `<b style="color:red">${word}</b>`)}</div>
                        </div>
                    </div>`;
            }
        });
    });
};

renderSidebar();
if (Object.keys(chatData).length > 0) renderChat(Object.keys(chatData)[0]);

</script>
